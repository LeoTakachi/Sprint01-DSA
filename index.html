<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoodWe</title>
    <link rel="icon" type="image/png" href="./assets/icone.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img class="logo" alt="Logo GoodWe" src="./assets/logo_goodwe.png">

<div class="container">
    <h1 class="titulo">🔋 Sessão de Recarga</h1>

    <form class="form-recarga" id="formRecarga">

        <label class="form-label">Tipo de Usuário:</label>
        <select>
            <option>Comum</option>
            <option>Premium (20% de Desconto)</option>
        </select>

        <label>Tempo de Recarga (minutos):</label>
        <input type="number" placeholder="Ex: 60" required>

        <label>Potência do Carregador (kW):</label>
        <input type="number" placeholder="Ex: 7" required>

        <label>Horário:</label>
        <select>
            <option>Normal</option>
            <option>Pico (Acréscimo de 30%)</option>
        </select>

        <button type="submit">Iniciar Sessão</button>

    </form>

    <div class="resultado">
        <h2>Resultado da Sessão</h2>
        <p><strong>Energia Consumida:</strong> -- kWh</p>
        <p><strong>Tempo Total:</strong> -- min</p>
        <p><strong>Tarifa:</strong> R$ --</p>
        <p><strong>Valor Total:</strong> R$ --</p>
        <p><strong>Desconto:</strong> R$ --</p>
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
